repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --directory backend ruff format --check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        entry: uv run --directory backend ruff check .
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run --directory backend mypy --strict .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run --directory backend pytest
        language: system
        pass_filenames: false
        always_run: true
