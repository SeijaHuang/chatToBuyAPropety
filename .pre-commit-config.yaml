repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --directory backend mypy --strict .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run --directory backend pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: frontend-typecheck
        name: frontend type-check
        entry: pnpm --dir frontend type-check
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: frontend-test
        name: frontend unit tests
        entry: pnpm --dir frontend test:run
        language: system
        files: ^frontend/
        pass_filenames: false
