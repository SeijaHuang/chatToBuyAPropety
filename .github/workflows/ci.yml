name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint, Type Check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

  backend:
    name: Backend — Lint, Type Check & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: propertyai
          POSTGRES_PASSWORD: propertyai
          POSTGRES_DB: propertyai_test
        options: >-
          --health-cmd "pg_isready -U propertyai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: mypy type check
        run: uv run mypy --strict .

      - name: pytest with coverage
        run: uv run pytest --cov --cov-fail-under=80
        env:
          OPENROUTER_API_KEY: test-key
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql+asyncpg://propertyai:propertyai@localhost:5432/propertyai_test
